<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试登录</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #660874;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        button:hover {
            background: #4a0563;
        }
        .result {
            background: white;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            border: 1px solid #ddd;
        }
        .success {
            border-color: #28a745;
            background: #d4edda;
            color: #155724;
        }
        .error {
            border-color: #dc3545;
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            border-color: #bee5eb;
            color: #0c5460;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>🔐 测试登录功能</h1>

    <div class="info">
        <strong>注意:</strong> 密码必须包含大小写字母和数字，至少8位
    </div>

    <h2>登录</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="loginUsername">用户名:</label>
            <input type="text" id="loginUsername" value="testuser123" required>
        </div>
        <div class="form-group">
            <label for="loginPassword">密码:</label>
            <input type="password" id="loginPassword" value="Password123" required>
        </div>
        <button type="submit">登录</button>
    </form>

    <h2>注册</h2>
    <form id="registerForm">
        <div class="form-group">
            <label for="registerUsername">用户名:</label>
            <input type="text" id="registerUsername" placeholder="输入新用户名" required>
        </div>
        <div class="form-group">
            <label for="registerEmail">邮箱:</label>
            <input type="email" id="registerEmail" placeholder="输入邮箱地址" required>
        </div>
        <div class="form-group">
            <label for="registerPassword">密码:</label>
            <input type="password" id="registerPassword" placeholder="Password123" required>
        </div>
        <div class="form-group">
            <label for="registerFullName">姓名:</label>
            <input type="text" id="registerFullName" placeholder="输入姓名">
        </div>
        <button type="submit">注册</button>
    </form>

    <div id="result"></div>

    <script>
        const API_BASE = 'http://localhost:5005/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('✅ 登录成功！', 'success');
                    console.log('登录响应:', data);

                    // 保存token
                    if (data.tokens && data.tokens.access_token) {
                        localStorage.setItem('access_token', data.tokens.access_token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                    }
                } else {
                    showResult(`❌ 登录失败: ${data.error}`, 'error');
                }
            } catch (error) {
                showResult(`❌ 网络错误: ${error.message}`, 'error');
                console.error('登录错误:', error);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const full_name = document.getElementById('registerFullName').value || username;

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, email, password, full_name })
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('✅ 注册成功！', 'success');
                    console.log('注册响应:', data);
                } else {
                    showResult(`❌ 注册失败: ${data.error}`, 'error');
                }
            } catch (error) {
                showResult(`❌ 网络错误: ${error.message}`, 'error');
                console.error('注册错误:', error);
            }
        });

        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<div class="result ${type}">${message}</div>`;
        }

        // 测试API连通性
        async function testConnection() {
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username: 'test', password: 'test' })
                });

                if (response.status === 400) {
                    showResult('✅ API连接正常 (400错误是预期的，因为用户名密码不匹配)', 'success');
                }
            } catch (error) {
                showResult(`❌ API连接失败: ${error.message}`, 'error');
            }
        }

        // 页面加载时测试连接
        window.addEventListener('load', testConnection);
    </script>
</body>
</html>
